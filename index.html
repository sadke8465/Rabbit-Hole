<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rabbit Hole POC</title>
<style>
  body { font-family: monospace; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  #trail { color: #888; margin-bottom: 20px; font-size: 13px; min-height: 18px; }
  #node-title { font-size: 20px; font-weight: bold; margin-bottom: 8px; }
  #node-extract { font-size: 13px; color: #444; margin-bottom: 24px; line-height: 1.6; }
  .tier-group { margin-bottom: 16px; }
  .tier-label { font-size: 11px; font-weight: bold; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .blue .tier-label  { color: #2255cc; }
  .yellow .tier-label { color: #997700; }
  .red .tier-label   { color: #cc2200; }
  .candidate { cursor: pointer; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 14px; }
  .candidate:hover { text-decoration: underline; }
  #refresh { cursor: pointer; margin-top: 16px; font-size: 12px; color: #888; background: none; border: 1px solid #ccc; padding: 4px 10px; display: none; }
  #seed-form { margin-bottom: 32px; }
  #seed-input { font-family: monospace; font-size: 16px; padding: 6px; width: 300px; }
  #go-btn { font-family: monospace; font-size: 16px; padding: 6px 12px; margin-left: 6px; cursor: pointer; }
  #status { color: #888; font-size: 13px; min-height: 18px; margin-bottom: 12px; }
  #error { color: red; font-size: 13px; }
  #back { font-family: monospace; font-size: 12px; color: #888; background: none; border: none; cursor: pointer; padding: 0; margin-bottom: 16px; display: none; }
  #back:hover { text-decoration: underline; }
</style>
</head>
<body>

<div id="seed-form">
  <input id="seed-input" type="text" placeholder="Enter a topic..." />
  <button id="go-btn" onclick="startDive()">Go</button>
</div>

<div id="trail"></div>
<button id="back" onclick="goBack()">← Back</button>
<div id="node-title"></div>
<div id="node-extract"></div>
<div id="status"></div>
<div id="error"></div>
<div id="candidates-container"></div>
<button id="refresh" onclick="refresh()">↻ Refresh options</button>

<script>
const WIKI_API = 'https://en.wikipedia.org/w/api.php';

const JUNK_PREFIXES = [
  'List of', 'Category:', 'Wikipedia:', 'File:', 'Template:',
  'Help:', 'Portal:', 'Draft:', 'Talk:', 'MOS:', 'WP:'
];
const JUNK_SUBSTRINGS = ['(disambiguation)', '(TV series)', '(film)', '(album)', '(song)'];

const SHOW_PER_TIER = 2;

// State
let trail = [];   // [{ title, extract, links }]
let pool = [];    // scored candidates for current node

// ─── API ───────────────────────────────────────────────────────────────────

async function fetchPage(title) {
  const params = new URLSearchParams({
    action:      'query',
    titles:      title,
    prop:        'links|extracts',
    exintro:     'true',
    exsentences: '5',
    pllimit:     '500',
    format:      'json',
    origin:      '*',
    redirects:   '1'
  });
  const res  = await fetch(`${WIKI_API}?${params}`);
  const data = await res.json();
  const page = Object.values(data.query.pages)[0];
  if (page.missing !== undefined) return null;
  return page;
}

// ─── Scoring ───────────────────────────────────────────────────────────────

function isJunk(title) {
  for (const p of JUNK_PREFIXES)    if (title.startsWith(p))  return true;
  for (const s of JUNK_SUBSTRINGS)  if (title.includes(s))    return true;
  return false;
}

function stripHtml(html) {
  return html ? html.replace(/<[^>]*>/g, '') : '';
}

function scoreCandidates(links, extract) {
  const introText = stripHtml(extract).toLowerCase();
  const clean     = (links || []).filter(l => !isJunk(l.title));

  return clean.map((link, i) => {
    const title    = link.title;
    const titleLow = title.toLowerCase();
    const inIntro  = introText.includes(titleLow);
    const words    = title.split(' ').length;
    const early    = i < 40;

    let tier;
    if (inIntro && words <= 3) {
      tier = 'blue';
    } else if (inIntro || (early && words <= 4)) {
      tier = 'yellow';
    } else {
      tier = 'red';
    }

    return { title, tier };
  });
}

// ─── UI helpers ────────────────────────────────────────────────────────────

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }
function setError(msg)  { document.getElementById('error').textContent  = msg; }

function renderTrail() {
  const el    = document.getElementById('trail');
  const back  = document.getElementById('back');
  el.textContent = trail.map(n => n.title).join(' → ');
  back.style.display = trail.length > 1 ? 'inline' : 'none';
}

function renderNode(page) {
  document.getElementById('node-title').textContent   = page.title;
  const text = stripHtml(page.extract || '');
  document.getElementById('node-extract').textContent = text.slice(0, 400) + (text.length > 400 ? '…' : '');
}

function renderCandidates() {
  const container = document.getElementById('candidates-container');
  container.innerHTML = '';

  const blues   = shuffle(pool.filter(c => c.tier === 'blue')).slice(0, SHOW_PER_TIER);
  const yellows = shuffle(pool.filter(c => c.tier === 'yellow')).slice(0, SHOW_PER_TIER);
  const reds    = shuffle(pool.filter(c => c.tier === 'red')).slice(0, SHOW_PER_TIER);

  const groups = [
    { label: '🔵 Closely related',        items: blues,   cls: 'blue'   },
    { label: '🟡 Unexpected angle',        items: yellows, cls: 'yellow' },
    { label: '🔴 Down the rabbit hole',    items: reds,    cls: 'red'    },
  ];

  for (const g of groups) {
    if (!g.items.length) continue;
    const div   = document.createElement('div');
    div.className = `tier-group ${g.cls}`;

    const label = document.createElement('div');
    label.className   = 'tier-label';
    label.textContent = g.label;
    div.appendChild(label);

    for (const c of g.items) {
      const row       = document.createElement('div');
      row.className   = 'candidate';
      row.textContent = c.title;
      row.onclick     = () => navigateTo(c.title);
      div.appendChild(row);
    }
    container.appendChild(div);
  }

  document.getElementById('refresh').style.display = 'inline-block';
}

// ─── Navigation ────────────────────────────────────────────────────────────

async function navigateTo(title) {
  setStatus('Fetching…');
  setError('');
  document.getElementById('candidates-container').innerHTML = '';
  document.getElementById('refresh').style.display = 'none';

  const page = await fetchPage(title);
  if (!page) {
    setStatus('');
    setError('Article not found.');
    return;
  }

  trail.push({ title: page.title, page });
  renderTrail();
  renderNode(page);

  pool = scoreCandidates(page.links, page.extract);
  setStatus('');
  renderCandidates();
}

function goBack() {
  if (trail.length <= 1) return;
  trail.pop();
  const prev = trail[trail.length - 1];
  trail.pop(); // navigateTo will re-push
  navigateTo(prev.title);
}

function refresh() {
  renderCandidates();
}

async function startDive() {
  const input = document.getElementById('seed-input').value.trim();
  if (!input) return;
  trail = [];
  pool  = [];
  setError('');
  document.getElementById('node-title').textContent   = '';
  document.getElementById('node-extract').textContent = '';
  document.getElementById('candidates-container').innerHTML = '';
  document.getElementById('refresh').style.display = 'none';
  document.getElementById('back').style.display    = 'none';
  await navigateTo(input);
}

document.getElementById('seed-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startDive();
});
</script>

</body>
</html>
